<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>测试</title>
    <script src="ancient_destiny.js"></script>
    <script>
        console.log('Testing...');
        const system = new AncientDestinySystem();
        
        const birth_data = {
            lunar_year: 1986,
            lunar_month: 1,
            lunar_day: 13,
            hour: 23,
            gender: '女'
        };
        
        const pillars = system.calculate_stem_branch(birth_data);
        console.log('四柱计算 OK', pillars);
        
        const da_yun = system.calculate_da_yun(pillars, birth_data.gender, birth_data.lunar_month, birth_data.lunar_year);
        console.log('大运计算 OK', da_yun.length + '步');
        
        const shensha = system.shen_sha_analysis(pillars);
        console.log('神煞分析 OK', shensha);
        
        const [palaces, ming] = system.calculate_twelve_palaces(birth_data.lunar_month, pillars.hour.branch);
        console.log('十二宫计算 OK', Object.keys(palaces).length + '宫, 命宫=' + ming);
        
        console.log('=== 全部测试通过 ===');
    </script>
</head>
<body>
    打开开发者工具console查看测试结果
</body>
</html>
